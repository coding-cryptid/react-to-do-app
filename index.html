<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>React Todo — Step 8 (Final)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* same CSS as Step 1 — included again here for copy-paste simplicity */
    :root{--bg:#fff;--text:#11181c;--muted:#6b7280;--border:#e5e7eb;--accent:#111827;--accent-contrast:#fff;--chip:#f3f4f6;--chip-active:#111827;--shadow:0 10px 25px rgba(0,0,0,.06)}
    *{box-sizing:border-box} html,body,#root{height:100%}
    body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text)}
    .app{max-width:640px;margin:48px auto;padding:24px}
    .title{margin:0 0 4px;letter-spacing:-.5px;font-size:32px}
    .subtitle{margin:0 0 20px;color:var(--muted)}
    .todo-form{display:grid;grid-template-columns:1fr auto;gap:12px;margin-bottom:16px}
    .input{padding:12px 14px;border:1px solid var(--border);border-radius:12px}
    .input:focus{outline:none;border-color:var(--accent)}
    .btn{padding:12px 16px;border:0;border-radius:12px;background:var(--accent);color:var(--accent-contrast);cursor:pointer}
    .btn:hover{opacity:.95}.btn:active{transform:translateY(1px)}
    .toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:8px 0 16px}
    .filters{display:flex;gap:8px;flex-wrap:wrap}
    .chip{border:1px solid var(--border);background:var(--chip);padding:6px 12px;border-radius:999px;cursor:pointer}
    .chip--active{background:var(--chip-active);color:#fff;border-color:var(--chip-active)}
    .counter{color:var(--muted);font-size:14px}
    .todo-list{list-style:none;padding:0;margin:0;display:grid;gap:8px}
    .todo{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:#fff;box-shadow:var(--shadow)}
    .todo__left{display:flex;align-items:center;gap:10px;cursor:pointer}
    .checkbox{width:18px;height:18px;accent-color:var(--accent)}
    .todo__title{line-height:1.3}
    .todo--done .todo__title{text-decoration:line-through;color:var(--muted)}
    .icon-btn{border:0;background:transparent;font-size:22px;line-height:1;cursor:pointer;color:#9ca3af}
    .icon-btn:hover{color:#ef4444}
    .empty{padding:16px;border:1px dashed var(--border);border-radius:12px;color:var(--muted);text-align:center;background:#fafafa}
    .footer{margin-top:16px;display:flex;justify-content:flex-end}
    .ghost{background:transparent;border:1px solid var(--border);padding:8px 12px;border-radius:10px;cursor:pointer}
    .ghost:hover{border-color:#d1d5db}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const STORAGE_KEY = "todos:v1";
    const FILTERS = { ALL: "all", ACTIVE: "active", COMPLETED: "completed" };

    function App() {
      // hydrate once from localStorage using a lazy initializer
      const [todos, setTodos] = useState(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch {
          return [];
        }
      });
      const [text, setText] = useState("");
      const [filter, setFilter] = useState(FILTERS.ALL);

      // persist after every change
      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
      }, [todos]);

      function handleAdd(e) {
        e.preventDefault();
        const t = text.trim();
        if (!t) return;
        const todo = { id: crypto.randomUUID(), title: t, completed: false, createdAt: Date.now() };
        setTodos(prev => [todo, ...prev]);
        setText("");
      }

      function toggleTodo(id) {
        setTodos(prev => prev.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
      }

      function deleteTodo(id) {
        setTodos(prev => prev.filter(t => t.id !== id));
      }

      const visible = useMemo(() => {
        if (filter === FILTERS.ACTIVE) return todos.filter(t => !t.completed);
        if (filter === FILTERS.COMPLETED) return todos.filter(t => t.completed);
        return todos;
      }, [todos, filter]);

      const remaining = todos.filter(t => !t.completed).length;

      return (
        <main className="app">
          <header className="app-header">
            <h1 className="title">Todo</h1>
            <p className="subtitle">State is the source of truth; storage is just persistence.</p>
          </header>

          <form className="todo-form" onSubmit={handleAdd}>
            <input
              className="input"
              placeholder="Add a task…"
              value={text}
              onChange={(e) => setText(e.target.value)}
              aria-label="New task title"
              autoFocus
            />
            <button className="btn" type="submit">Add</button>
          </form>

          <section className="toolbar">
            <div className="filters" role="tablist" aria-label="Filters">
              {Object.values(FILTERS).map(f => (
                <button
                  key={f}
                  type="button"
                  role="tab"
                  aria-selected={filter === f}
                  className={`chip ${filter === f ? "chip--active" : ""}`}
                  onClick={() => setFilter(f)}
                >
                  {f[0].toUpperCase() + f.slice(1)}
                </button>
              ))}
            </div>
            <span className="counter" aria-live="polite">{remaining} left</span>
          </section>

          {visible.length === 0 ? (
            <p className="empty">Nothing here. Add your first task!</p>
          ) : (
            <ul className="todo-list">
              {visible.map(t => (
                <li key={t.id} className={`todo ${t.completed ? "todo--done" : ""}`}>
                  <label className="todo__left">
                    <input
                      className="checkbox"
                      type="checkbox"
                      checked={t.completed}
                      onChange={() => toggleTodo(t.id)}
                      aria-label={`Mark "${t.title}" ${t.completed ? "incomplete" : "complete"}`}
                    />
                    <span className="todo__title">{t.title}</span>
                  </label>
                  <button className="icon-btn" title="Delete" onClick={() => deleteTodo(t.id)}>×</button>
                </li>
              ))}
            </ul>
          )}

          {todos.length > 0 && (
            <footer className="footer">
              <button
                className="ghost"
                type="button"
                onClick={() => {
                  if (confirm("Clear completed tasks?")) {
                    setTodos(prev => prev.filter(t => !t.completed));
                  }
                }}
              >
                Clear Completed
              </button>
            </footer>
          )}
        </main>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
